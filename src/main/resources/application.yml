spring:
    application:
        name: authservice
    data:
        redis:
            host: ${SPRING_DATA_REDIS_HOST:redis}
            port: ${SPRING_DATA_REDIS_PORT:6379}
    datasource:
        driver-class-name: org.postgresql.Driver
        hikari:
            data-source-properties:
                tcpKeepAlive: true
        password:
            file: ${SPRING_DATASOURCE_PASSWORD_FILE}
        url: ${SPRING_DATASOURCE_URL}
        username: ${SPRING_DATASOURCE_USERNAME}
jwt:
    issuer: ${JWT_ISSUER:http://localhost:8081}
    audience: ${JWT_AUDIENCE:authservice}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
    private:
        key:
            file: ${JWT_PRIVATE_KEY_FILE}
    public:
        key: classpath:publickey.pem
server:
    port: 8081
springdoc:
    swagger-ui:
        tryItOutEnabled: true